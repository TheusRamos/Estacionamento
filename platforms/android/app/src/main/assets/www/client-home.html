<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Início - Estacionamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

<div id="toast-container"></div>
<div id="modal-container"></div>

<header class="app-topbar" id="app-topbar">
  <button class="icon-btn" id="topbar-menu-btn" aria-label="Menu">
    <span class="material-symbols-rounded">menu</span>
  </button>
  <span class="app-topbar__title" id="topbar-title">Início</span>
  <div class="app-topbar__actions" id="topbar-actions"></div>
</header>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="app-sidebar">
  <div class="sidebar__header">
    <div class="sidebar__brand">
      <div class="sidebar__brand-icon"><span class="material-symbols-rounded">local_parking</span></div>
      <div>
        <div class="sidebar__brand-name">Estacionamento</div>
        <div class="sidebar__brand-tagline">Sistema de gestão</div>
      </div>
    </div>
    <button class="icon-btn sidebar__close-btn" id="sidebar-close-btn" aria-label="Fechar menu">
      <span class="material-symbols-rounded">close</span>
    </button>
  </div>
  <nav class="sidebar__nav" id="sidebar-nav"></nav>
  <div class="sidebar__bottom">
    <div class="sidebar__user">
      <div class="avatar" id="sidebar-avatar">?</div>
      <div style="min-width:0">
        <div class="sidebar__user-name" id="sidebar-user-name">—</div>
        <div class="sidebar__user-role" id="sidebar-user-role">—</div>
      </div>
    </div>
    <button class="sidebar__logout-btn" id="btn-sidebar-logout">
      <span class="material-symbols-rounded">logout</span>Sair
    </button>
  </div>
</aside>

<footer class="app-footer">Desenvolvido por Matheus Ramos e Lukas Raymond</footer>

<main class="auth-page">
  <div class="main-content">
    <div class="dashboard-greeting">
      <p class="dashboard-greeting__hello">Olá,</p>
      <h2 class="dashboard-greeting__name" id="client-name">Carregando...</h2>
    </div>

    <div id="active-session-banner" class="d-none">
      <div class="active-session-card mb-4">
        <p class="active-session-card__label">Sessão ativa</p>
        <p class="active-session-card__spot" id="active-spot-code">A-01</p>
        <div class="active-session-card__timer" id="active-session-timer">00:00:00</div>
        <div class="active-session-card__footer">
          <span class="active-session-card__cost" id="active-session-cost">R$ 0,00</span>
          <span class="badge" style="background:rgba(255,255,255,.2);color:white">Em andamento</span>
        </div>
      </div>
    </div>

    <div id="active-reservation-banner" class="d-none mb-4">
      <div class="card" style="border-left:4px solid var(--color-warning)">
        <div class="card__body card__body--compact">
          <div class="d-flex align-center justify-between">
            <div>
              <p class="text-sm text-muted">Reserva ativa</p>
              <p class="text-bold" id="res-spot-code">—</p>
            </div>
            <div class="text-right">
              <p class="text-xs text-muted">Expira em</p>
              <p class="text-bold text-danger" id="res-expires">—</p>
            </div>
          </div>
          <button class="btn btn--ghost btn--sm w-full mt-3" id="btn-cancel-reservation">Cancelar reserva</button>
        </div>
      </div>
    </div>

    <div class="stats-grid mb-6">
      <div class="stat-card">
        <div class="stat-card__icon" style="background:var(--color-primary-surface);color:var(--color-primary)">
          <span class="material-symbols-rounded">local_parking</span>
        </div>
        <div class="stat-card__value" id="stat-available-spots">—</div>
        <div class="stat-card__label">Vagas livres</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon" style="background:var(--color-success-surface);color:var(--color-success)">
          <span class="material-symbols-rounded">history</span>
        </div>
        <div class="stat-card__value" id="stat-total-sessions">—</div>
        <div class="stat-card__label">Sessões</div>
      </div>
    </div>

    <div class="section-header">
      <h3 class="section-title">Ações rápidas</h3>
    </div>
    <div class="card">
      <button class="list-item" id="quick-reserve">
        <div class="list-item__icon" style="background:var(--color-primary-surface);color:var(--color-primary)">
          <span class="material-symbols-rounded">bookmark_add</span>
        </div>
        <div class="list-item__content">
          <p class="list-item__title">Reservar vaga</p>
          <p class="list-item__subtitle">Garanta sua vaga antes de chegar</p>
        </div>
        <span class="material-symbols-rounded list-item__action">chevron_right</span>
      </button>
      <button class="list-item" id="quick-vehicles">
        <div class="list-item__icon" style="background:var(--color-info-surface);color:var(--color-info)">
          <span class="material-symbols-rounded">directions_car</span>
        </div>
        <div class="list-item__content">
          <p class="list-item__title">Meus veículos</p>
          <p class="list-item__subtitle">Gerencie seus veículos cadastrados</p>
        </div>
        <span class="material-symbols-rounded list-item__action">chevron_right</span>
      </button>
      <button class="list-item" id="quick-history">
        <div class="list-item__icon" style="background:var(--color-success-surface);color:var(--color-success)">
          <span class="material-symbols-rounded">receipt_long</span>
        </div>
        <div class="list-item__content">
          <p class="list-item__title">Histórico de sessões</p>
          <p class="list-item__subtitle">Veja seus estacionamentos anteriores</p>
        </div>
        <span class="material-symbols-rounded list-item__action">chevron_right</span>
      </button>
    </div>
  </div>
</main>

<script src="cordova.js"></script>
  <script type="module">
  import { initLayout } from './js/layout.js';
  import { initClientDashboard } from './js/pages/client/dashboard.js';
  initLayout({ title: 'Início' }).then(user => initClientDashboard(user)).catch(() => {});
</script>
</body>
</html>
