<body class="auth-layout">

<div id="toast-container"></div>
<div id="modal-container"></div>

<footer class="app-footer">Desenvolvido por Matheus Ramos e Lukas Raymond</footer>

<div class="auth-page-bg">
  <div class="auth-card-wrap">
    <div class="auth-card">
      <div class="auth-card__top">
        <div class="auth-card__icon">
          <span class="material-symbols-rounded">lock_open</span>
        </div>
        <h1 class="auth-card__title">Acesso ao Sistema</h1>
        <p class="auth-card__subtitle">Bem-vindo de volta ao painel de gestão</p>
      </div>

      <form id="form-login" class="form-stack" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">E-mail <span>*</span></label>
          <input id="login-email" type="email" class="form-control" placeholder="seu@email.com"
            autocomplete="email" required />
          <p class="form-error" id="login-email-error"></p>
        </div>
        <div class="form-group">
          <div class="form-label-row">
            <label class="form-label" for="login-password">Senha <span>*</span></label>
          </div>
          <div class="form-input-wrapper">
            <input id="login-password" type="password" class="form-control" placeholder="••••••••"
              autocomplete="current-password" required />
            <span class="material-symbols-rounded form-input-icon form-input-icon--clickable"
              id="toggle-login-password">visibility</span>
          </div>
          <p class="form-error" id="login-password-error"></p>
        </div>
        <button type="submit" class="btn btn--primary btn--full btn--lg" id="btn-login">
          <span class="btn__text">Entrar no Sistema</span>
          <span class="btn__spinner spinner spinner--sm"></span>
        </button>
      </form>

      <div class="auth-divider">ou</div>

      <button type="button" class="btn btn--google btn--full btn--lg" id="btn-google-login">
        <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        <span class="btn__text">Continuar com Google</span>
        <span class="btn__spinner spinner spinner--sm"></span>
      </button>

      <div class="auth-footer">
        Não tem conta?
        <button type="button" id="go-to-register">Cadastre-se</button>
      </div>
    </div>

    <div class="auth-trust">
      <div class="auth-trust__item">
        <span class="material-symbols-rounded">verified_user</span>
        Criptografia SSL
      </div>
      <div class="auth-trust__item">
        <span class="material-symbols-rounded">gpp_maybe</span>
        Acesso Auditado
      </div>
    </div>
  </div>
</div>

<script src="cordova.js"></script>
