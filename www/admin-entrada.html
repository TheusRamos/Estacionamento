<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap:; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.google.com https://*.firebaseapp.com https://*.firebaseio.com wss://*.firebaseio.com;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Entrada / Saída - Estacionamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

<div id="toast-container"></div>
<div id="modal-container"></div>

<header class="app-topbar" id="app-topbar">
  <button class="icon-btn" id="topbar-menu-btn" aria-label="Menu">
    <span class="material-symbols-rounded">menu</span>
  </button>
  <span class="app-topbar__title" id="topbar-title">Entrada / Saída</span>
  <div class="app-topbar__actions" id="topbar-actions"></div>
</header>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="app-sidebar">
  <div class="sidebar__header">
    <div class="sidebar__brand">
      <div class="sidebar__brand-icon"><span class="material-symbols-rounded">local_parking</span></div>
      <div>
        <div class="sidebar__brand-name">Estacionamento</div>
        <div class="sidebar__brand-tagline">Sistema de gestão</div>
      </div>
    </div>
    <button class="icon-btn sidebar__close-btn" id="sidebar-close-btn" aria-label="Fechar menu">
      <span class="material-symbols-rounded">close</span>
    </button>
  </div>
  <nav class="sidebar__nav" id="sidebar-nav"></nav>
  <div class="sidebar__bottom">
    <div class="sidebar__user">
      <div class="avatar" id="sidebar-avatar">?</div>
      <div style="min-width:0">
        <div class="sidebar__user-name" id="sidebar-user-name">—</div>
        <div class="sidebar__user-role" id="sidebar-user-role">—</div>
      </div>
    </div>
    <button class="sidebar__logout-btn" id="btn-sidebar-logout">
      <span class="material-symbols-rounded">logout</span>Sair
    </button>
  </div>
</aside>

<footer class="app-footer">Desenvolvido por Matheus Ramos e Lukas Raymond</footer>

<main class="auth-page">
  <div class="main-content">
    <div class="entry-exit-toggle mb-6">
      <button class="entry-exit-toggle__btn active--entry" id="toggle-entry" data-mode="entry">
        <span class="material-symbols-rounded" style="font-size:18px">login</span>
        Entrada
      </button>
      <button class="entry-exit-toggle__btn" id="toggle-exit" data-mode="exit">
        <span class="material-symbols-rounded" style="font-size:18px">logout</span>
        Saída
      </button>
    </div>

    <div id="reservas-checkin-section" class="d-none mb-4">
      <div class="card">
        <div class="card__header">
          <h3 class="card__title">
            <span class="material-symbols-rounded" style="font-size:18px;vertical-align:middle;margin-right:6px">bookmark</span>
            Reservas aguardando check-in
          </h3>
        </div>
        <div id="reservas-checkin-list"></div>
      </div>
    </div>

    <div id="entry-form-section">
      <div class="card">
        <div class="card__header">
          <h3 class="card__title">Registrar entrada</h3>
        </div>
        <div class="card__body">
          <form class="form-stack" id="form-entry" novalidate>
            <div class="form-group">
              <label class="form-label">Placa do veículo <span>*</span></label>
              <input type="text" class="form-control" id="entry-plate"
                placeholder="AAA-0000 ou AAA0A00" maxlength="8"
                style="text-transform:uppercase" required />
            </div>
            <div class="form-group">
              <label class="form-label">Vaga <span>*</span></label>
              <select class="form-control" id="entry-spot" required>
                <option value="">Selecione uma vaga livre</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Tarifa <span>*</span></label>
              <select class="form-control" id="entry-tariff" required>
                <option value="">Selecione uma tarifa</option>
              </select>
            </div>
            <button type="submit" class="btn btn--success btn--full" id="btn-entry-submit">
              <span class="btn__text">
                <span class="material-symbols-rounded">login</span>
                Registrar entrada
              </span>
              <span class="btn__spinner spinner spinner--sm"></span>
            </button>
          </form>
        </div>
      </div>
    </div>

    <div id="exit-form-section" class="d-none">
      <div class="card">
        <div class="card__header">
          <h3 class="card__title">Registrar saída</h3>
        </div>
        <div class="card__body">
          <form class="form-stack" id="form-exit" novalidate>
            <div class="form-group">
              <label class="form-label">Placa do veículo <span>*</span></label>
              <input type="text" class="form-control" id="exit-plate"
                placeholder="AAA-0000 ou AAA0A00" maxlength="8"
                style="text-transform:uppercase" required />
              <button type="button" class="btn btn--secondary btn--sm mt-2 w-full" id="btn-search-plate">
                <span class="material-symbols-rounded">search</span>
                Buscar sessão ativa
              </button>
            </div>
            <div id="exit-session-info" class="d-none">
              <div class="card" style="border:1.5px solid var(--color-primary)">
                <div class="card__body card__body--compact">
                  <div class="d-flex justify-between mb-2">
                    <span class="text-muted text-sm">Vaga</span>
                    <span class="text-bold" id="exit-info-spot">—</span>
                  </div>
                  <div class="d-flex justify-between mb-2">
                    <span class="text-muted text-sm">Entrada</span>
                    <span class="text-bold" id="exit-info-entry">—</span>
                  </div>
                  <div class="d-flex justify-between mb-2">
                    <span class="text-muted text-sm">Tempo</span>
                    <span class="text-bold" id="exit-info-time">—</span>
                  </div>
                  <div class="d-flex justify-between">
                    <span class="text-muted text-sm">Valor estimado</span>
                    <span class="text-bold text-primary" id="exit-info-cost">—</span>
                  </div>
                </div>
              </div>
              <div class="form-group mt-4">
                <label class="form-label">Forma de pagamento <span>*</span></label>
                <select class="form-control" id="exit-payment-method" required>
                  <option value="">Selecione</option>
                  <option value="pix">Pix</option>
                  <option value="cartao">Cartão</option>
                  <option value="dinheiro">Dinheiro</option>
                </select>
              </div>
              <button type="submit" class="btn btn--danger btn--full mt-4" id="btn-exit-submit">
                <span class="btn__text">
                  <span class="material-symbols-rounded">logout</span>
                  Confirmar saída
                </span>
                <span class="btn__spinner spinner spinner--sm"></span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="cordova.js"></script>
<script src="js/dist/admin-entrada.js"></script>
</body>
</html>
