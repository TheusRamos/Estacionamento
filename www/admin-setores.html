<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap:; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.google.com https://*.firebaseapp.com https://*.firebaseio.com wss://*.firebaseio.com;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Setores e Vagas - Estacionamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

<div id="toast-container"></div>
<div id="modal-container"></div>

<header class="app-topbar" id="app-topbar">
  <button class="icon-btn" id="topbar-menu-btn" aria-label="Menu">
    <span class="material-symbols-rounded">menu</span>
  </button>
  <span class="app-topbar__title" id="topbar-title">Setores e Vagas</span>
  <div class="app-topbar__actions" id="topbar-actions"></div>
</header>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="app-sidebar">
  <div class="sidebar__header">
    <div class="sidebar__brand">
      <div class="sidebar__brand-icon"><span class="material-symbols-rounded">local_parking</span></div>
      <div>
        <div class="sidebar__brand-name">Estacionamento</div>
        <div class="sidebar__brand-tagline">Sistema de gestão</div>
      </div>
    </div>
    <button class="icon-btn sidebar__close-btn" id="sidebar-close-btn" aria-label="Fechar menu">
      <span class="material-symbols-rounded">close</span>
    </button>
  </div>
  <nav class="sidebar__nav" id="sidebar-nav"></nav>
  <div class="sidebar__bottom">
    <div class="sidebar__user">
      <div class="avatar" id="sidebar-avatar">?</div>
      <div style="min-width:0">
        <div class="sidebar__user-name" id="sidebar-user-name">—</div>
        <div class="sidebar__user-role" id="sidebar-user-role">—</div>
      </div>
    </div>
    <button class="sidebar__logout-btn" id="btn-sidebar-logout">
      <span class="material-symbols-rounded">logout</span>Sair
    </button>
  </div>
</aside>

<footer class="app-footer">Desenvolvido por Matheus Ramos e Lukas Raymond</footer>

<main class="auth-page">
  <div class="main-content">
    <div id="sectors-list">
      <div class="empty-state">
        <span class="material-symbols-rounded empty-state__icon">grid_view</span>
        <p class="empty-state__title">Nenhum setor</p>
        <p class="empty-state__text">Adicione setores para organizar as vagas do estacionamento.</p>
        <button class="btn btn--primary mt-4" id="btn-add-sector-empty">
          <span class="material-symbols-rounded">add</span>
          Novo setor
        </button>
      </div>
    </div>
  </div>
</main>

<script src="cordova.js"></script>
<script src="js/dist/admin-setores.js"></script>
</body>
</html>
